name: Build PVPBot Mod

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip and prepare project
        run: |
          unzip pvpbot-v1_2_2-lunar-gui.zip
          cp -r pvpbot-v1.2/. .
          rm -rf pvpbot-v1.2 pvpbot-v1.2.2-lunar-gui.zip

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: gradle build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvpbot-mod
          path: build/libs/*.jar
          if-no-files-found: error

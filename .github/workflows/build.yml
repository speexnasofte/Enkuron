name: Build Mod

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:
    inputs:
      zip_file:
        description: 'ZIP archive name (leave empty to auto-detect)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip and prepare project
        run: |
          # Auto-detect zip or use manually specified name
          if [ -n "${{ github.event.inputs.zip_file }}" ]; then
            ZIP_FILE="${{ github.event.inputs.zip_file }}"
          else
            ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          fi

          if [ -z "$ZIP_FILE" ]; then
            echo "❌ No ZIP archive found in repository root!"
            exit 1
          fi

          echo "📦 Found archive: $ZIP_FILE"

          # -o = overwrite without prompting, -q = quiet (no per-file spam)
          unzip -o -q "$ZIP_FILE"
          rm -f "$ZIP_FILE"

          # If extracted into a subfolder — move contents up
          DIRS=$(find . -maxdepth 1 -mindepth 1 -type d ! -name ".git" ! -name "gradle")
          DIR_COUNT=$(echo "$DIRS" | grep -c .)
          if [ "$DIR_COUNT" -eq 1 ] && [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
            SUBDIR=$(echo "$DIRS" | head -n 1)
            echo "📁 Moving contents from $SUBDIR to root"
            cp -rn "$SUBDIR/." .
            rm -rf "$SUBDIR"
          fi

          echo "📂 Final directory:"
          ls -la

          # Verify gradle files exist
          if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
            echo "❌ settings.gradle not found after extraction!"
            exit 1
          fi
          echo "✅ Gradle project ready"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: gradle build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-build
          path: build/libs/*.jar
          if-no-files-found: error

name: Build Enkuron Mod

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip and prepare project
        run: |
          unzip enkuron_patched.zip
          cp -r enkuron_patched/. .
          rm -rf enkuron_patched enkuron_patched.zip

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: gradle build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: enkuron-mod
          path: build/libs/enkuron-*.jar
          if-no-files-found: error

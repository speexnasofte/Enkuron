name: Build Mod

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip enkuron_v2_fixed.zip

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant execute permission
        run: chmod +x enkuron_v2_patched/gradlew

      - name: Build
        run: cd enkuron_v2_patched && ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: enkuron-mod
          path: enkuron_v2_patched/build/libs/*.jar
